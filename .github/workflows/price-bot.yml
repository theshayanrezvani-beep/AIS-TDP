name: price-bot

on:
  repository_dispatch:
    types: [run-prices]
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"    # ۱۲:۰۰ تهران
    - cron: "30 20 * * *"   # ۰۰:۰۰ تهران

permissions:
  contents: read

concurrency:
  group: price-bot
  cancel-in-progress: false

jobs:
  post-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          SIGNATURE: ${{ secrets.SIGNATURE }}
        run: python price_bot.py
